name: Bug report
description: Report a reproducible Lotus Growth issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid sharing private account data, cookies, tokens, or campaign logs.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the exact command you ran.
      placeholder: |
        1. Run `pnpm dlx ...`
        2. Edit `config/project.json`
        3. Run `lotus-growth plan`
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.12.1"
  - type: input
    id: pnpm-version
    attributes:
      label: pnpm version
      placeholder: "9.15.2"
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      render: shell
